<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=0" name="viewport">
<meta content="yes" name="apple-mobile-web-app-capable">
<meta content="yes" name="apple-touch-fullscreen">
<meta content="black" name="apple-mobile-web-app-status-bar-style">
<meta content="320" name="MobileOptimized">
<!-- 引入微信JS-SDK，核心：调用微信原生接口 -->
<script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
<title>群聊加入</title>
<style>
  body { margin: 0; padding: 0; overflow: hidden; }
  .loader {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fff;
    z-index: 9999;
  }
  .loader-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .loader-spinner {
    width: 40px;
    height: 40px;
    border: 4px solid #f3f3f3;
    border-top: 4px solid #3498db;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  .loader-text {
    font-size: 16px;
    color: #666;
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    text-align: center;
  }
  .loader-nums {
    display: inline-flex;
    align-items: center;
    color: #3498db;
  }
  .loader-num {
    visibility: hidden;
    opacity: 0;
    animation: num-cycle 2s step-end infinite;
  }
  .loader-num:nth-child(1) { animation-delay: 0s; }
  .loader-num:nth-child(2) { animation-delay: 0.3s; }
  .loader-num:nth-child(3) { animation-delay: 0.6s; }
  .loader-num:nth-child(4) { animation-delay: 0.9s; }
  @keyframes num-cycle {
    0% { visibility: hidden; opacity: 0; }
    1% { visibility: visible; opacity: 1; }
    70% { visibility: visible; opacity: 1; }
    71% { visibility: hidden; opacity: 0; }
    100% { visibility: hidden; opacity: 0; }
  }
  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
</style>
</head>
<body>
  <div class="loader">
    <div class="loader-group">
      <div class="loader-spinner"></div>
      <div class="loader-text">
        群聊加入中
        <div class="loader-nums">
          <span class="loader-num">.</span>
          <span class="loader-num">.</span>
          <span class="loader-num">.</span>
          <span class="loader-num">.</span>
        </div>
      </div>
    </div>
  </div>
  <script>
    // 你的宝塔目标链接，无需修改
    const fullUrl = 'https://a.6611.fun/group.php/index/share/id/145/t/39cf80539ff482c6c118d1bb7a4b2e2b/time/1773337246.html';
    // 微信JS-SDK适配：优先用微信原生跳转，兼容苹果微信
    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(() => {
        try {
          // 苹果微信：调用微信内置浏览器跳转，绕开跨域拦截
          wx.miniProgram.navigateTo({ url: fullUrl });
        } catch (e) {
          // 兜底：非微信环境/调用失败，用原生跳转
          window.location.href = fullUrl;
        }
      }, 1000);
    });
  </script>
</body>
</html>
