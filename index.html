<html lang="zh-CN">
<head>
<meta charset="UTF-8">
  <meta content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=0" name="viewport">
  <meta content="yes" name="apple-mobile-web-app-capable">
  <meta content="yes" name="apple-touch-fullscreen">
  <meta content="black" name="apple-mobile-web-app-status-bar-style">
  <meta content="320" name="MobileOptimized">
  <title>群聊加入</title>
  <style>
    .content {
      height: 100%;
      width: 100%;
      position: fixed;
      left: 0;
      top: 0;
      border: none;
      margin: 0;
      padding: 0;
      display: none;
    }
    body { margin: 0; padding: 0; overflow: hidden; }
    .loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      z-index: 9999;
    }
    .loader-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .loader-spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #3498db;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    .loader-text {
      font-size: 16px;
      color: #666;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      text-align: center;
    }
    .loader-nums {
      display: inline-flex;
      align-items: center;
      color: #3498db;
    }
    .loader-num {
      visibility: hidden;
      opacity: 0;
      animation: num-cycle 2s step-end infinite;
    }
    .loader-num:nth-child(1) { animation-delay: 0s; }
    .loader-num:nth-child(2) { animation-delay: 0.3s; }
    .loader-num:nth-child(3) { animation-delay: 0.6s; }
    .loader-num:nth-child(4) { animation-delay: 0.9s; }
    @keyframes num-cycle {
      0% { visibility: hidden; opacity: 0; }
      1% { visibility: visible; opacity: 1; }
      70% { visibility: visible; opacity: 1; }
      71% { visibility: hidden; opacity: 0; }
      100% { visibility: hidden; opacity: 0; }
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loader">
    <div class="loader-group">
      <div class="loader-spinner"></div>
      <div class="loader-text">
        群聊加入中
        <div class="loader-nums">
          <span class="loader-num">.</span>
          <span class="loader-num">.</span>
          <span class="loader-num">.</span>
          <span class="loader-num">.</span>
        </div>
      </div>
    </div>
  </div>
  <script>
    // 直接使用固定完整链接，去掉参数解析
    const fullUrl = 'https://123.56.183.89/group.php/index/share/id/145/t/39cf80539ff482c6c118d1bb7a4b2e2b/time/1773337246.html';
    // 直接创建iframe加载
    window.onload = null;
    if (document.body.onload) document.body.onload = null;
    const iframe = document.createElement('iframe');
    iframe.className = 'content';
    iframe.src = fullUrl;
    iframe.frameBorder = '0';
    iframe.scrolling = 'auto';
    // 加载完成隐藏加载动画，显示内容
    iframe.onload = function() {
      document.querySelector('.loader').style.display = 'none';
      iframe.style.display = 'block';
    };
    // 加载失败兜底提示
    iframe.onerror = function() {
      document.querySelector('.loader').style.display = 'none';
      alert('内容加载失败，请检查网络');
    };
    document.body.appendChild(iframe);
  </script>
</body>
</html>
