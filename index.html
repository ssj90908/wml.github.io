<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=0" name="viewport">
<meta content="yes" name="apple-mobile-web-app-capable">
<meta content="yes" name="apple-touch-fullscreen">
<meta content="black" name="apple-mobile-web-app-status-bar-style">
<meta content="320" name="MobileOptimized">
<title>群聊加入</title>
<style>
  .content {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    width: 100vw;
    height: 100vh;
    border: none;
    margin: 0;
    padding: 0;
    display: none;
  }
  body { margin: 0; padding: 0; overflow: hidden; }
  .loader {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fff;
    z-index: 9999;
  }
  .loader-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .loader-spinner {
    width: 40px;
    height: 40px;
    border: 4px solid #f3f3f3;
    border-top: 4px solid #3498db;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  .loader-text {
    font-size: 16px;
    color: #666;
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    text-align: center;
  }
  .loader-nums {
    display: inline-flex;
    align-items: center;
    color: #3498db;
  }
  .loader-num {
    visibility: hidden;
    opacity: 0;
    animation: num-cycle 2s step-end infinite;
  }
  .loader-num:nth-child(1) { animation-delay: 0s; }
  .loader-num:nth-child(2) { animation-delay: 0.3s; }
  .loader-num:nth-child(3) { animation-delay: 0.6s; }
  .loader-num:nth-child(4) { animation-delay: 0.9s; }
  @keyframes num-cycle {
    0% { visibility: hidden; opacity: 0; }
    1% { visibility: visible; opacity: 1; }
    70% { visibility: visible; opacity: 1; }
    71% { visibility: hidden; opacity: 0; }
    100% { visibility: hidden; opacity: 0; }
  }
  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
</style>
</head>
<body>
  <div class="loader">
    <div class="loader-group">
      <div class="loader-spinner"></div>
      <div class="loader-text">
        群聊加入中
        <div class="loader-nums">
          <span class="loader-num">.</span>
          <span class="loader-num">.</span>
          <span class="loader-num">.</span>
          <span class="loader-num">.</span>
        </div>
      </div>
    </div>
  </div>
  <script>
    // 【重要】替换此处为：已备案的域名HTTPS完整链接（删除原IP直连地址）
    const fullUrl = 'https://a.6611.fun/group.php/index/share/id/145/t/f6d161e1809b714811a64697602cc240/time/1773506499.html';
    
    document.addEventListener('DOMContentLoaded', function() {
      const iframe = document.createElement('iframe');
      iframe.className = 'content';
      iframe.src = fullUrl;
      iframe.frameBorder = '0';
      iframe.scrolling = 'auto';

      // 兼容iOS微信的加载状态监听
      iframe.onreadystatechange = function() {
        if (this.readyState === 'complete' || this.readyState === 'interactive') {
          document.querySelector('.loader').style.display = 'none';
          iframe.style.display = 'block';
        }
      };

      // 8秒超时兜底，防止加载无响应
      setTimeout(() => {
        const loader = document.querySelector('.loader');
        if (loader && loader.style.display !== 'none') {
          loader.style.display = 'none';
          alert('加载超时，请刷新重试或在Safari中打开');
        }
      }, 8000);

      document.body.appendChild(iframe);
    });
  </script>
</body>
</html>
